name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      VITE_MIVA_API_URL: ${{ vars.MIVA_API_URL }}
      VITE_WEB_CONSOLE_URL: ${{ vars.MIVA_WEB_CONSOLE_URL }}
      MIVA_WEB_ORIGINS: ${{ vars.MIVA_WEB_ORIGINS }}
      MIVA_CORS_ORIGINS: ${{ vars.MIVA_WEB_ORIGINS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        run: npm ci --prefix apps/desktop

      - name: Build Windows installer
        run: npm run package:desktop
        env:
          MIVA_SKIP_WEB_INSTALLER_COPY: "1"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: miva-desktop-windows
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
