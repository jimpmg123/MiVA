# Run from monorepo root so packages/shared is available during build.
# Railway: clear Root Directory (use repo root) and set Config File to /apps/api/railway.toml
[build]
builder = "NIXPACKS"
buildCommand = "cd apps/api && npm ci && npm run build"

[deploy]
startCommand = "cd apps/api && npm run start:prod"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
